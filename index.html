<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Analytics 2026</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7f9; margin: 0; padding: 10px; color: #333; }
        .dashboard-container { max-width: 1400px; margin: auto; }
        
        .header-meta { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; gap: 10px; }
        .update-stamp { font-size: 13px; color: #666; font-weight: 600; background: #eee; padding: 4px 10px; border-radius: 4px; }
        .control-panel { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; flex-direction: column; gap: 20px; }
        .row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-start; }
        .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1 1 200px; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #777; letter-spacing: 0.5px; }
        select, .filter-btn { padding: 10px 14px; border: 1px solid #dfe3e8; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .filter-btn:hover { background: #f4f6f8; }
        .filter-btn.active { background: #003087; color: white; border-color: #003087; }
        .team-pill-container, #geo-filters { display: flex; flex-wrap: wrap; gap: 6px; max-height: 180px; overflow-y: auto; padding: 12px; border: 1px solid #dfe3e8; border-radius: 8px; background: #fafbfc; }
        @media (max-width: 768px) { #geo-filters { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 15px; } .filter-btn { white-space: nowrap; } }
        .team-pill { padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid #ddd; background: #fff; transition: 0.2s; white-space: nowrap; }
        .team-pill.active { background: #003087; color: white; border-color: #003087; }
        .chart-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        svg { width: 100%; height: auto; display: block; overflow: visible; }
        .line { fill: none; stroke-width: 2.5; opacity: 0.3; transition: opacity 0.2s; cursor: crosshair; }
        .line.hovered { opacity: 1 !important; stroke-width: 5 !important; }
        .mlb-trend-line { fill: none; stroke: #000; stroke-width: 2; stroke-dasharray: 5,5; opacity: 0.7; pointer-events: none; }
        .team-label { font-size: 11px; font-weight: bold; fill: #444; }
        .swarm-dot { stroke: #fff; stroke-width: 0.5; opacity: 0.7; cursor: pointer; }
        .swarm-dot:hover { stroke: #333; stroke-width: 1.5; opacity: 1; }
        .mean-marker { stroke-width: 4; stroke-dasharray: 6,3; cursor: help; opacity: 0.6; }
        .mlb-mean-line { stroke: #000; stroke-width: 2; stroke-dasharray: 4,4; opacity: 0.8; pointer-events: none; }
        .mlb-mean-label { font-size: 10px; font-weight: bold; fill: #000; text-anchor: middle; }
        .tooltip { position: absolute; padding: 12px; background: rgba(255, 255, 255, 0.98); border-left: 5px solid #003087; border-radius: 4px; pointer-events: none; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-size: 13px; z-index: 1000; min-width: 180px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 8px 0; }
        h2 { font-size: 1.1rem; margin: 0; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-meta">
        <h1 style="margin:0; font-size: 1.5rem; color: #003087;">MLB Analytics 2026</h1>
        <div id="last-updated" class="update-stamp">Connecting...</div>
    </div>

    <div class="chart-card">
        <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 id="standings-title">League Standings</h2>
            <div class="btn-row">
                <button id="btn-rundiff" class="filter-btn active" onclick="setStandingsStat('runDifferential')">Run Diff</button>
                <button id="btn-games500" class="filter-btn" onclick="setStandingsStat('gamesOver500')">Games .500</button>
            </div>
        </div>
        <div id="standings-chart"></div>
    </div>

    <div class="control-panel">
        <div class="row">
            <div class="control-group">
                <label>Category</label>
                <select id="data-category" onchange="changeCategory()">
                    <option value="pitching">Pitching</option>
                    <option value="hitting">Hitting</option>
                    <option value="fielding">Fielding</option>
                </select>
            </div>
            <div class="control-group">
                <label>Statistic</label>
                <select id="stat-selector" onchange="updateVisuals()"></select>
            </div>
            <div class="control-group">
                <label>View Mode</label>
                <div class="btn-row">
                    <button id="btn-line" class="filter-btn active" onclick="setViewMode('line')">Lines</button>
                    <button id="btn-race" class="filter-btn" onclick="setViewMode('race')">Horse Race</button>
                </div>
            </div>
        </div>
        <div class="control-group">
            <label>Quick Filters</label>
            <div id="geo-filters">
                <button class="filter-btn active" onclick="applyGeo('ALL', this)">All MLB</button>
                <button class="filter-btn" onclick="applyGeo('AL', this)">AL</button>
                <button class="filter-btn" onclick="applyGeo('NL', this)">NL</button>
                <button class="filter-btn" onclick="applyGeo('AL-East', this)">AL-East</button>
                <button class="filter-btn" onclick="applyGeo('AL-Central', this)">AL-Central</button>
                <button class="filter-btn" onclick="applyGeo('AL-West', this)">AL-West</button>
                <button class="filter-btn" onclick="applyGeo('NL-East', this)">NL-East</button>
                <button class="filter-btn" onclick="applyGeo('NL-Central', this)">NL-Central</button>
                <button class="filter-btn" onclick="applyGeo('NL-West', this)">NL-West</button>
            </div>
        </div>
        <div class="control-group">
            <label>Team Selection</label>
            <div id="team-picker" class="team-pill-container"></div>
            <div style="margin-top:8px; display: flex; gap: 10px;">
                <button class="filter-btn" style="font-size:10px; padding: 6px 10px;" onclick="clearAllTeams()">Clear All</button>
                <button class="filter-btn" style="font-size:10px; padding: 6px 10px;" onclick="selectAllTeams()">Select All</button>
            </div>
        </div>
    </div>

    <div class="chart-card">
        <h2 id="trend-title">Season Performance Trends</h2>
        <div id="s2d-chart"></div>
    </div>

    <div class="chart-card">
        <h2 id="swarm-title">Variance by Game</h2>
        <div class="row" style="margin-bottom: 20px;">
            <button id="sort-name-btn" class="filter-btn active" onclick="setSort('name')">Sort by Name</button>
            <button id="sort-mean-btn" class="filter-btn" onclick="setSort('mean')">Sort by Mean</button>
        </div>
        <div id="swarm-chart"></div>
    </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const statsConfig = {
    fielding: [{label:"Assists",key:"assists",dir:"desc"},{label:"Double Plays",key:"doublePlays",dir:"desc"},{label:"Errors",key:"errors",dir:"asc"},{label:"Fielding %",key:"fielding",dir:"desc"},{label:"Put Outs",key:"putOuts",dir:"desc"},{label:"Range Factor/9 Inn",key:"rangeFactorPer9Inn",dir:"desc"},{label:"Range Factor/Game",key:"rangeFactorPerGame",dir:"desc"},{label:"Triple Plays",key:"triplePlays",dir:"desc"}],
    hitting: [{label:"2B",key:"doubles",dir:"desc"},{label:"3B",key:"triples",dir:"desc"},{label:"AB Per HR",key:"atBatsPerHomeRun",dir:"asc"},{label:"AVG",key:"avg",dir:"desc"},{label:"Avg. Balls in Play",key:"babip",dir:"desc"},{label:"BB",key:"baseOnBalls",dir:"desc"},{label:"Fly Outs",key:"airOuts",dir:"asc"},{label:"GIDP",key:"groundIntoDoublePlay",dir:"asc"},{label:"Ground Outs",key:"groundOuts",dir:"asc"},{label:"H",key:"hits",dir:"desc"},{label:"HRs",key:"homeRuns",dir:"desc"},{label:"Ks",key:"strikeOuts",dir:"asc"},{label:"OBP",key:"obp",dir:"desc"},{label:"OPS",key:"ops",dir:"desc"},{label:"RBI",key:"rbi",dir:"desc"},{label:"Runs Scored",key:"runs",dir:"desc"},{label:"SB",key:"stolenBases",dir:"desc"},{label:"SB %",key:"stolenBasePercentage",dir:"desc"},{label:"SLG",key:"slg",dir:"desc"}],
    pitching: [{label:"Avg. Against",key:"avg",dir:"asc"},{label:"ERA",key:"era",dir:"asc"},{label:"Hits Allowed",key:"hits",dir:"asc"},{label:"HR Allowed",key:"homeRuns",dir:"asc"},{label:"K to Walk Ratio",key:"strikeoutWalkRatio",dir:"desc"},{label:"Ks per 9",key:"strikeoutsPer9Inn",dir:"desc"},{label:"Pitches Per Inning",key:"pitchesPerInning",dir:"asc"},{label:"Runs Allowed",key:"runs",dir:"asc"},{label:"Strike %",key:"strikePercentage",dir:"desc"},{label:"Walks per 9",key:"walksPer9Inn",dir:"asc"},{label:"WHIP",key:"whip",dir:"asc"},{label:"Win %",key:"winPercentage",dir:"desc"}]
};

const margin = {top: 40, right: 180, bottom: 40, left: 60};
const swarmMargin = {top: 60, right: 180, bottom: 60, left: 220}; 
const width = 1350 - margin.left - margin.right;
const height = 550 - margin.top - margin.bottom;

let currentCategory = 'pitching', currentView = 'line', currentSort = 'name', currentStandingsStat = 'runDifferential';
let activeTeams = new Set(), s2dData, dailyData, standingsData, teamColors, trendSvg, swarmSvg, standingsSvg, xTrend, yTrend, xSwarm, ySwarm, xStand, yStand;

const bisectDate = d3.bisector(d => new Date(d.date)).left;

async function initApp() {
    try {
        const log = await d3.json("./data/update_log.json");
        d3.select("#last-updated").text(`Last Sync: ${log.last_updated}`);
    } catch(e) { d3.select("#last-updated").text("Live Sync Active"); }

    teamColors = await d3.json("./data/team_colors.json");
    const rawStandings = await d3.json("./data/standings.json");
    
    standingsData = rawStandings.map(d => {
        const w = parseInt(d.wins) || 0;
        const gp = parseInt(d.gamesPlayed) || 0;
        return { 
            ...d, 
            wins: w,
            gamesPlayed: gp,
            gamesOver500: (2 * w) - gp 
        };
    });

    Object.keys(teamColors).forEach(id => activeTeams.add(id));
    
    standingsSvg = d3.select("#standings-chart").append("svg").attr("viewBox", `0 0 ${width+margin.left+margin.right} ${height+margin.top+margin.bottom}`).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
    trendSvg = d3.select("#s2d-chart").append("svg").attr("viewBox", `0 0 ${width+margin.left+margin.right} ${height+margin.top+margin.bottom}`).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
    swarmSvg = d3.select("#swarm-chart").append("svg").attr("viewBox", `0 0 ${width+swarmMargin.left+swarmMargin.right} 900`).append("g").attr("transform", `translate(${swarmMargin.left},${swarmMargin.top})`);
    
    xTrend = d3.scaleTime().range([0, width]); yTrend = d3.scaleLinear().range([height, 0]);
    xSwarm = d3.scaleLinear().range([0, width]); ySwarm = d3.scaleBand().paddingInner(1);
    xStand = d3.scaleTime().range([0, width]); yStand = d3.scaleLinear().range([height, 0]);

    standingsSvg.append("g").attr("class", "x-axis-stand").attr("transform", `translate(0,${height})`);
    standingsSvg.append("g").attr("class", "y-axis-stand");
    trendSvg.append("g").attr("class", "x-axis").attr("transform", `translate(0,${height})`);
    trendSvg.append("g").attr("class", "y-axis");
    swarmSvg.append("g").attr("class", "x-axis-swarm");

    buildTeamPills(); changeCategory();
}

function buildTeamPills() {
    const picker = d3.select("#team-picker");
    Object.entries(teamColors).sort((a,b) => a[1].name.localeCompare(b[1].name)).forEach(([id, info]) => {
        picker.append("div").attr("class", "team-pill active").attr("id", `pill-${id}`).text(info.name)
            .on("click", function() { if (activeTeams.has(id)) activeTeams.delete(id); else activeTeams.add(id); d3.select(this).classed("active", activeTeams.has(id)); updateVisuals(); });
    });
}

function clearAllTeams() { activeTeams.clear(); d3.selectAll(".team-pill").classed("active", false); updateVisuals(); }
function selectAllTeams() { Object.keys(teamColors).forEach(id => activeTeams.add(id)); d3.selectAll(".team-pill").classed("active", true); updateVisuals(); }

async function changeCategory() {
    currentCategory = d3.select("#data-category").property("value");
    const sel = d3.select("#stat-selector"); sel.selectAll("option").remove();
    const sortedStats = [...statsConfig[currentCategory]].sort((a,b) => a.label.localeCompare(b.label));
    sortedStats.forEach(s => sel.append("option").text(s.label).attr("value", s.key));
    s2dData = await d3.json(`./data/${currentCategory}_s2d.json`);
    dailyData = await d3.json(`./data/${currentCategory}.json`);
    updateVisuals();
}

function getDailyRank(fullData, date, teamId, stat, sortDir) {
    const allUniqueDates = Array.from(new Set(fullData.map(d => d.date))).sort();
    const currentIdx = allUniqueDates.indexOf(date);
    const visibleTeams = Array.from(new Set(fullData.map(d => d.teamId)));
    const snapshot = visibleTeams.map(tid => {
        const teamHistory = fullData.filter(d => d.teamId === tid && allUniqueDates.indexOf(d.date) <= currentIdx);
        if (teamHistory.length === 0) return { teamId: tid, val: null };
        const latestEntry = teamHistory[teamHistory.length - 1];
        return { teamId: tid, val: +latestEntry[stat] };
    }).filter(d => d.val !== null && !isNaN(d.val));
    snapshot.sort((a,b) => sortDir === 'desc' ? d3.descending(a.val, b.val) : d3.ascending(a.val, b.val));
    const rank = snapshot.findIndex(s => s.teamId === teamId) + 1;
    return rank > 0 ? rank : snapshot.length; 
}

function updateVisuals() {
    const statKey = d3.select("#stat-selector").property("value");
    const statObj = statsConfig[currentCategory].find(s => s.key === statKey);
    const catDisplay = currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1);
    const fS2D = s2dData.filter(d => activeTeams.has(d.teamId.toString())).sort((a,b) => d3.ascending(new Date(a.date), new Date(b.date)));
    const fDaily = dailyData.filter(d => activeTeams.has(d.teamId.toString()));
    const fStand = standingsData.filter(d => activeTeams.has(d.teamId.toString())).sort((a,b) => d3.ascending(new Date(a.date), new Date(b.date)));

    d3.select("#standings-title").text(`League Standings: (${currentStandingsStat === 'runDifferential' ? 'Run Diff' : 'Games .500'} - League)`);
    d3.select("#trend-title").text(`Season Performance Trends: (${statObj.label} - ${catDisplay})`);
    d3.select("#swarm-title").text(`Variance by Game: (${statObj.label} - ${catDisplay})`);

    renderStandings(fStand, currentStandingsStat); 
    renderTrend(fS2D, statKey, statObj.dir); 
    renderSwarm(fDaily, statKey, statObj.dir);
}

function renderStandings(data, stat) {
    if(!data.length) return;
    const dateExtent = d3.extent(data, d => new Date(d.date));
    xStand.domain(dateExtent);
    
    if (currentView === 'line') { 
        const extent = d3.extent(data, d => +d[stat] || 0);
        yStand.domain([Math.min(0, extent[0]), Math.max(0, extent[1])]).nice(); 
    } else { 
        yStand.domain([activeTeams.size || 30, 1]); 
    }

    const mlbAvgTrend = d3.groups(standingsData, d => d.date).map(([date, values]) => {
        return { date: new Date(date), val: d3.mean(values, v => +v[stat] || 0) };
    }).filter(d => d.date >= dateExtent[0] && d.date <= dateExtent[1]).sort((a,b) => a.date - b.date);

    const line = d3.line().curve(d3.curveMonotoneX)
        .x(d => xStand(new Date(d.date)))
        .y(d => {
            const val = (currentView === 'line') ? (+d[stat] || 0) : getDailyRank(data, d.date, d.teamId, stat, 'desc');
            return yStand(val);
        });

    const groups = d3.groups(data, d => d.teamId);
    const lines = standingsSvg.selectAll(".stand-line").data(groups, d => d[0]);
    lines.exit().remove();
    lines.enter().append("path").attr("class", "stand-line line").attr("stroke", d => teamColors[d[0]]?.primary || "#ccc").merge(lines)
        .on("mousemove", function(ev, d) {
            d3.selectAll(".line").style("opacity", 0.05);
            d3.select(this).classed("hovered", true).raise();
            const mouseX = d3.pointer(ev, standingsSvg.node())[0];
            const date = xStand.invert(mouseX);
            const idx = bisectDate(d[1], date);
            const currentPoint = d[1][idx] || d[1][d[1].length-1];
            const latest = d[1][d[1].length-1];
            const mlbPoint = mlbAvgTrend.find(m => m.date.getTime() === new Date(currentPoint.date).getTime());
            showDualTooltip(ev, currentPoint, latest, stat, mlbPoint?.val);
        })
        .on("mouseleave", function() { d3.selectAll(".line").style("opacity", 0.3).classed("hovered", false); d3.select("#tooltip").style("display", "none"); })
        .transition().duration(800).attr("d", d => line(d[1]));

    standingsSvg.select(".x-axis-stand").call(d3.axisBottom(xStand).ticks(window.innerWidth < 600 ? 4 : 8));
    standingsSvg.select(".y-axis-stand").transition().duration(800).call(d3.axisLeft(yStand));
    
    standingsSvg.selectAll(".stand-label").remove();
    if (currentView === 'race') {
        const latestRanks = groups.map(g => g[1][g[1].length - 1]).sort((a,b) => d3.descending(+a[stat] || 0, +b[stat] || 0));
        standingsSvg.selectAll(".stand-label").data(latestRanks, d => d.teamId).enter().append("text")
            .attr("class", "stand-label team-label").attr("x", width + 5).attr("y", (d,i) => yStand(i+1) + 4)
            .text((d,i) => `${i+1}. ${teamColors[d.teamId]?.name}`);
    }
}

function renderTrend(data, stat, dir) {
    if(!data.length) return;
    const dateExtent = d3.extent(data, d => new Date(d.date));
    xTrend.domain(dateExtent);
    
    if (currentView === 'line') yTrend.domain(d3.extent(data, d => +d[stat] || 0)).nice();
    else yTrend.domain([activeTeams.size || 30, 1]);

    // FIXED: Filter mlbTrend to match current visible date domain
    const mlbTrend = d3.groups(s2dData, d => d.date).map(([date, values]) => {
        return { date: new Date(date), val: d3.mean(values, v => +v[stat] || 0) };
    }).filter(d => d.date >= dateExtent[0] && d.date <= dateExtent[1]).sort((a,b) => a.date - b.date);

    const line = d3.line().curve(d3.curveMonotoneX)
        .x(d => xTrend(new Date(d.date)))
        .y(d => {
            const val = (currentView === 'line') ? (+d[stat] || 0) : getDailyRank(data, d.date, d.teamId, stat, dir);
            return yTrend(val);
        });

    const groups = d3.groups(data, d => d.teamId);
    const lines = trendSvg.selectAll(".trend-line").data(groups, d => d[0]);
    lines.exit().remove();
    lines.enter().append("path").attr("class", "trend-line line").attr("stroke", d => teamColors[d[0]]?.primary || "#ccc").merge(lines)
        .on("mousemove", function(ev, d) {
            d3.selectAll(".line").style("opacity", 0.05);
            d3.select(this).classed("hovered", true).raise();
            const mouseX = d3.pointer(ev, trendSvg.node())[0];
            const date = xTrend.invert(mouseX);
            const idx = bisectDate(d[1], date);
            const currentPoint = d[1][idx] || d[1][d[1].length-1];
            const latest = d[1][d[1].length-1];
            const mlbPoint = mlbTrend.find(m => m.date.getTime() === new Date(currentPoint.date).getTime());
            showDualTooltip(ev, currentPoint, latest, stat, mlbPoint?.val);
        })
        .on("mouseleave", function() { d3.selectAll(".line").style("opacity", 0.3).classed("hovered", false); d3.select("#tooltip").style("display", "none"); })
        .transition().duration(800).attr("d", d => line(d[1]));

    trendSvg.selectAll(".mlb-trend-line").remove();
    if (currentView === 'line') {
        const mlbLineGen = d3.line().curve(d3.curveMonotoneX).x(d => xTrend(d.date)).y(d => yTrend(d.val));
        trendSvg.append("path").datum(mlbTrend).attr("class", "mlb-trend-line").attr("d", mlbLineGen);
    }

    trendSvg.select(".x-axis").call(d3.axisBottom(xTrend).ticks(window.innerWidth < 600 ? 4 : 8));
    trendSvg.select(".y-axis").transition().duration(800).call(d3.axisLeft(yTrend));
    
    trendSvg.selectAll(".trend-label").remove();
    if (currentView === 'race') {
        const latestRanks = groups.map(g => g[1][g[1].length - 1]).sort((a,b) => dir === 'desc' ? d3.descending(+a[stat] || 0, +b[stat] || 0) : d3.ascending(+a[stat] || 0, +b[stat] || 0));
        trendSvg.selectAll(".trend-label").data(latestRanks, d => d.teamId).enter().append("text")
            .attr("class", "trend-label team-label").attr("x", width + 5).attr("y", (d,i) => yTrend(i+1) + 4)
            .text((d,i) => `${i+1}. ${teamColors[d.teamId]?.name}`);
    }
}

function renderSwarm(data, stat, dir) {
    const teamGroups = d3.groups(data, d => d.teamId);
    const mlbAvg = d3.mean(dailyData, d => +d[stat] || 0);
    if (currentSort === 'mean') {
        const m = d3.rollup(data, v => d3.mean(v, d => +d[stat] || 0), d => d.teamId);
        teamGroups.sort((a,b) => dir === 'desc' ? d3.descending(m.get(a[0]), m.get(b[0])) : d3.ascending(m.get(a[0]), m.get(b[0])));
    } else teamGroups.sort((a,b) => d3.ascending(teamColors[a[0]]?.name, teamColors[b[0]]?.name));
    const sHeight = Math.max(teamGroups.length * 60 + 100, 400);
    d3.select("#swarm-chart svg").attr("viewBox", `0 0 ${width + swarmMargin.left + swarmMargin.right} ${sHeight}`);
    xSwarm.domain(d3.extent(dailyData, d => +d[stat] || 0)).nice();
    ySwarm.domain(teamGroups.map(d => d[0])).range([0, sHeight - 100]);
    swarmSvg.selectAll(".mlb-mean-group").remove();
    const mlbGroup = swarmSvg.append("g").attr("class", "mlb-mean-group");
    mlbGroup.append("line").attr("class", "mlb-mean-line").attr("x1", xSwarm(mlbAvg)).attr("x2", xSwarm(mlbAvg)).attr("y1", -20).attr("y2", sHeight - 100);
    mlbGroup.append("text").attr("class", "mlb-mean-label").attr("x", xSwarm(mlbAvg)).attr("y", -30).text(`MLB AVG: ${mlbAvg.toFixed(3)}`);
    const rows = swarmSvg.selectAll(".swarm-row").data(teamGroups, d => d[0]);
    rows.exit().remove();
    const rowsEnter = rows.enter().append("g").attr("class", "swarm-row");
    rowsEnter.append("text").attr("class", "row-label").attr("x", -15).attr("y", 5).attr("text-anchor", "end").style("font-size", "12px").style("font-weight", "600");
    rowsEnter.append("line").attr("class", "mean-marker").attr("y1", -22).attr("y2", 22);
    const mergedRows = rowsEnter.merge(rows);
    mergedRows.transition().duration(800).attr("transform", d => `translate(0,${ySwarm(d[0])})`);
    mergedRows.select(".row-label").text(d => teamColors[d[0]]?.name);
    mergedRows.each(function(d) {
        const rowG = d3.select(this), teamValues = d[1].map(v => +v[stat] || 0), med = d3.median(teamValues), avg = d3.mean(teamValues);
        const teamData = d[1].map(v => ({...v, x: xSwarm(+v[stat] || 0), y: 0}));
        const sim = d3.forceSimulation(teamData).force("x", d3.forceX(d => d.x).strength(1)).force("y", d3.forceY(0)).force("collide", d3.forceCollide(4.5)).stop();
        for (let i = 0; i < 120; ++i) sim.tick();
        const dots = rowG.selectAll(".swarm-dot").data(teamData, v => v.date);
        dots.exit().remove();
        dots.enter().append("circle").attr("class", "swarm-dot").attr("r", 4).attr("fill", teamColors[d[0]]?.primary || "#ccc").merge(dots)
            .on("mousemove", (ev, v) => showTooltipSwarm(ev, { team: teamColors[v.teamId].name, date: v.date, val: (+v[stat]).toFixed(3), mean: avg.toFixed(3), median: med.toFixed(3), min: d3.min(teamValues).toFixed(3), max: d3.max(teamValues).toFixed(3) }, stat, "game"))
            .on("mouseleave", () => d3.select("#tooltip").style("display", "none"))
            .transition().duration(800).attr("cx", v => v.x).attr("cy", v => v.y);
        rowG.select(".mean-marker").on("mousemove", (ev) => showTooltipSwarm(ev, { team: teamColors[d[0]].name, mean: avg.toFixed(3), median: med.toFixed(3), min: d3.min(teamValues).toFixed(3), max: d3.max(teamValues).toFixed(3) }, stat, "mean"))
            .transition().duration(800).attr("x1", xSwarm(avg)).attr("x2", xSwarm(avg)).attr("stroke", teamColors[d[0]]?.primary || "#333");
    });
    swarmSvg.select(".x-axis-swarm").attr("transform", `translate(0,${sHeight - 90})`).call(d3.axisBottom(xSwarm));
}

function setSort(m) { currentSort = m; d3.selectAll("#sort-name-btn, #sort-mean-btn").classed("active", false); d3.select(m==='name'?'#sort-name-btn':'#sort-mean-btn').classed("active", true); updateVisuals(); }
function setViewMode(v) { currentView = v; d3.selectAll("#btn-line, #btn-race").classed("active", false); d3.select(v==='line'?'#btn-line':'#btn-race').classed("active", true); updateVisuals(); }
function setStandingsStat(s) { currentStandingsStat = s; d3.selectAll("#btn-rundiff, #btn-games500").classed("active", false); d3.select(s==='runDifferential'?'#btn-rundiff':'#btn-games500').classed("active", true); updateVisuals(); }
function applyGeo(geo, btn) { activeTeams.clear(); d3.selectAll("#geo-filters .filter-btn").classed("active", false); d3.select(btn).classed("active", true); Object.entries(teamColors).forEach(([id, info]) => { const fullDiv = `${info.league}-${info.division}`; if (geo === 'ALL' || info.league === geo || fullDiv === geo) activeTeams.add(id); }); d3.selectAll(".team-pill").each(function() { const id = this.id.split('-')[1]; d3.select(this).classed("active", activeTeams.has(id)); }); updateVisuals(); }
function showDualTooltip(ev, current, latest, s, mlbAvg) { const tt = d3.select("#tooltip"); let content = `<b>${teamColors[current.teamId]?.name}</b><hr>Date: ${current.date}<br>Value: <b>${current[s]}</b><br>`; if (mlbAvg !== undefined) { content += `MLB Avg: <b>${mlbAvg.toFixed(3)}</b><br>`; } content += `<br>Season Latest: <b>${latest[s]}</b>`; tt.style("display", "block").style("left", (ev.pageX + 20) + "px").style("top", (ev.pageY - 20) + "px").html(content); }
function showTooltipSwarm(ev, st, s, type) { const tt = d3.select("#tooltip"); let content = `<b>${st.team}</b><hr>`; if (type === "game") content += `Date: ${st.date}<br>Val: <b>${st.val}</b><br><br>`; else content += `<b>Season Aggregates</b><br>`; content += `Mean: <b>${st.mean}</b><br>Median: ${st.median}<br>Range: ${st.min} - ${st.max}`; tt.style("display", "block").style("left", (ev.pageX + 20) + "px").style("top", (ev.pageY - 20) + "px").html(content); }

initApp();
</script>
</body>
</html>
