<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MLB Analytics 2026</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .dashboard-container { max-width: 1400px; margin: auto; }
        .control-panel { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; display: flex; flex-direction: column; gap: 20px; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #777; letter-spacing: 0.5px; }
        select, .filter-btn { padding: 8px 14px; border: 1px solid #dfe3e8; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .filter-btn:hover { background: #f4f6f8; }
        .filter-btn.active { background: #003087; color: white; border-color: #003087; }
        .team-pill-container { display: flex; flex-wrap: wrap; gap: 6px; max-height: 140px; overflow-y: auto; padding: 12px; border: 1px solid #dfe3e8; border-radius: 8px; background: #fafbfc; }
        .team-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid #ddd; background: #fff; transition: 0.2s; }
        .team-pill.active { background: #003087; color: white; border-color: #003087; }
        .chart-card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; position: relative; }
        .line { fill: none; stroke-width: 2.5; opacity: 0.3; transition: opacity 0.2s; cursor: crosshair; }
        .line.hovered { opacity: 1 !important; stroke-width: 5 !important; }
        .team-label { font-size: 11px; font-weight: bold; fill: #444; }
        .swarm-dot { stroke: #fff; stroke-width: 0.5; opacity: 0.7; cursor: pointer; }
        .swarm-dot:hover { stroke: #333; stroke-width: 1.5; opacity: 1; }
        .median-marker { stroke-width: 4; stroke-dasharray: 6,3; cursor: help; opacity: 0.6; }
        .tooltip { position: absolute; padding: 12px; background: rgba(255, 255, 255, 0.98); border-left: 5px solid #003087; border-radius: 4px; pointer-events: none; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-size: 13px; z-index: 1000; min-width: 180px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 8px 0; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="chart-card">
        <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 id="standings-title">League Standings</h2>
            <div class="btn-row">
                <button id="btn-rundiff" class="filter-btn active" onclick="setStandingsStat('runDifferential')">Run Differential</button>
                <button id="btn-winpct" class="filter-btn" onclick="setStandingsStat('winPercentage')">Win %</button>
            </div>
        </div>
        <div id="standings-chart"></div>
    </div>

    <div class="control-panel">
        <div class="row">
            <div class="control-group">
                <label>Category</label>
                <select id="data-category" onchange="changeCategory()">
                    <option value="pitching">Pitching</option>
                    <option value="hitting">Hitting</option>
                    <option value="fielding">Fielding</option>
                </select>
            </div>
            <div class="control-group">
                <label>Statistic</label>
                <select id="stat-selector" style="min-width: 200px;" onchange="updateVisuals()"></select>
            </div>
            <div class="control-group">
                <label>View Mode</label>
                <div class="btn-row">
                    <button id="btn-line" class="filter-btn active" onclick="setViewMode('line')">Lines</button>
                    <button id="btn-race" class="filter-btn" onclick="setViewMode('race')">Horse Race</button>
                </div>
            </div>
        </div>
        <div class="control-group">
            <label>Quick Filters</label>
            <div id="geo-filters" class="row" style="gap:8px;">
                <button class="filter-btn active" onclick="applyGeo('ALL', this)">All MLB</button>
                <button class="filter-btn" onclick="applyGeo('AL', this)">AL</button>
                <button class="filter-btn" onclick="applyGeo('NL', this)">NL</button>
                <div style="border-right: 1px solid #ddd; margin: 0 5px;"></div>
                <button class="filter-btn" onclick="applyGeo('AL-East', this)">AL-East</button>
                <button class="filter-btn" onclick="applyGeo('AL-Central', this)">AL-Central</button>
                <button class="filter-btn" onclick="applyGeo('AL-West', this)">AL-West</button>
                <div style="border-right: 1px solid #ddd; margin: 0 5px;"></div>
                <button class="filter-btn" onclick="applyGeo('NL-East', this)">NL-East</button>
                <button class="filter-btn" onclick="applyGeo('NL-Central', this)">NL-Central</button>
                <button class="filter-btn" onclick="applyGeo('NL-West', this)">NL-West</button>
            </div>
        </div>
        <div class="control-group">
            <label>Team Selection</label>
            <div id="team-picker" class="team-pill-container"></div>
            <div style="margin-top:8px; display: flex; gap: 10px;">
                <button class="filter-btn" style="font-size:10px;" onclick="clearAllTeams()">Clear All</button>
                <button class="filter-btn" style="font-size:10px;" onclick="selectAllTeams()">Select All</button>
            </div>
        </div>
    </div>

    <div class="chart-card">
        <h2 id="trend-title">Season Performance Trends</h2>
        <div id="s2d-chart"></div>
    </div>

    <div class="chart-card">
        <h2 id="swarm-title">Daily Outcome Variance</h2>
        <div class="row" style="margin-bottom: 20px;">
            <button id="sort-name-btn" class="filter-btn active" onclick="setSort('name')">Sort by Name</button>
            <button id="sort-mean-btn" class="filter-btn" onclick="setSort('mean')">Sort by Mean</button>
        </div>
        <div id="swarm-chart"></div>
    </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const statsConfig = {
    fielding: [{label:"Assists",key:"assists",dir:"desc"},{label:"Double Plays",key:"doublePlays",dir:"desc"},{label:"Errors",key:"errors",dir:"asc"},{label:"Fielding %",key:"fielding",dir:"desc"},{label:"Put Outs",key:"putOuts",dir:"desc"},{label:"Range Factor/9 Inn",key:"rangeFactorPer9Inn",dir:"desc"},{label:"Range Factor/Game",key:"rangeFactorPerGame",dir:"desc"},{label:"Triple Plays",key:"triplePlays",dir:"desc"}],
    hitting: [{label:"2B",key:"doubles",dir:"desc"},{label:"3B",key:"triples",dir:"desc"},{label:"AB Per HR",key:"atBatsPerHomeRun",dir:"asc"},{label:"AVG",key:"avg",dir:"desc"},{label:"Avg. Balls in Play",key:"babip",dir:"desc"},{label:"BB",key:"baseOnBalls",dir:"desc"},{label:"Fly Outs",key:"airOuts",dir:"asc"},{label:"GIDP",key:"groundIntoDoublePlay",dir:"asc"},{label:"Ground Outs",key:"groundOuts",dir:"asc"},{label:"H",key:"hits",dir:"desc"},{label:"HRs",key:"homeRuns",dir:"desc"},{label:"Ks",key:"strikeOuts",dir:"asc"},{label:"OBP",key:"obp",dir:"desc"},{label:"OPS",key:"ops",dir:"desc"},{label:"RBI",key:"rbi",dir:"desc"},{label:"Runs Scored",key:"runs",dir:"desc"},{label:"SB",key:"stolenBases",dir:"desc"},{label:"SB %",key:"stolenBasePercentage",dir:"desc"},{label:"SLG",key:"slg",dir:"desc"}],
    pitching: [{label:"Avg. Against",key:"avg",dir:"asc"},{label:"ERA",key:"era",dir:"asc"},{label:"Hits Allowed",key:"hits",dir:"asc"},{label:"HR Allowed",key:"homeRuns",dir:"asc"},{label:"K to Walk Ratio",key:"strikeoutWalkRatio",dir:"desc"},{label:"Ks per 9",key:"strikeoutsPer9Inn",dir:"desc"},{label:"Pitches Per Inning",key:"pitchesPerInning",dir:"asc"},{label:"Runs Allowed",key:"runs",dir:"asc"},{label:"Strike %",key:"strikePercentage",dir:"desc"},{label:"Walks per 9",key:"walksPer9Inn",dir:"asc"},{label:"WHIP",key:"whip",dir:"asc"},{label:"Win %",key:"winPercentage",dir:"desc"}]
};

const margin = {top: 50, right: 200, bottom: 40, left: 220}, width = 1350 - margin.left - margin.right, height = 550 - margin.top - margin.bottom;
const SEASON_START_DT = new Date("2026-03-25"), SEASON_END_DT = new Date("2026-09-27");
let currentCategory = 'pitching', currentView = 'line', currentSort = 'name', currentStandingsStat = 'runDifferential';
let activeTeams = new Set(), s2dData, dailyData, standingsData, teamColors, trendSvg, swarmSvg, standingsSvg, xTrend, yTrend, xSwarm, ySwarm, xStand, yStand;

const bisectDate = d3.bisector(d => new Date(d.date)).left;

async function initApp() {
    teamColors = await d3.json("./data/team_colors.json");
    standingsData = await d3.json("./data/standings.json");
    Object.keys(teamColors).forEach(id => activeTeams.add(id));
    standingsSvg = d3.select("#standings-chart").append("svg").attr("width", width+margin.left+margin.right).attr("height", height+margin.top+margin.bottom).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
    trendSvg = d3.select("#s2d-chart").append("svg").attr("width", width+margin.left+margin.right).attr("height", height+margin.top+margin.bottom).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
    swarmSvg = d3.select("#swarm-chart").append("svg").attr("width", width+margin.left+margin.right).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
    xTrend = d3.scaleTime().range([0, width]); yTrend = d3.scaleLinear().range([height, 0]);
    xSwarm = d3.scaleLinear().range([0, width]); ySwarm = d3.scaleBand().paddingInner(1);
    xStand = d3.scaleTime().domain([SEASON_START_DT, SEASON_END_DT]).range([0, width]); yStand = d3.scaleLinear().range([height, 0]);
    standingsSvg.append("g").attr("class", "x-axis-stand").attr("transform", `translate(0,${height})`);
    standingsSvg.append("g").attr("class", "y-axis-stand");
    trendSvg.append("g").attr("class", "x-axis").attr("transform", `translate(0,${height})`);
    trendSvg.append("g").attr("class", "y-axis");
    swarmSvg.append("g").attr("class", "x-axis-swarm");
    buildTeamPills(); changeCategory();
}

function buildTeamPills() {
    const picker = d3.select("#team-picker");
    Object.entries(teamColors).sort((a,b) => a[1].name.localeCompare(b[1].name)).forEach(([id, info]) => {
        picker.append("div").attr("class", "team-pill active").attr("id", `pill-${id}`).text(info.name)
            .on("click", function() { if (activeTeams.has(id)) activeTeams.delete(id); else activeTeams.add(id); d3.select(this).classed("active", activeTeams.has(id)); updateVisuals(); });
    });
}

function clearAllTeams() { activeTeams.clear(); d3.selectAll(".team-pill").classed("active", false); updateVisuals(); }
function selectAllTeams() { Object.keys(teamColors).forEach(id => activeTeams.add(id)); d3.selectAll(".team-pill").classed("active", true); updateVisuals(); }

async function changeCategory() {
    currentCategory = d3.select("#data-category").property("value");
    const sel = d3.select("#stat-selector"); sel.selectAll("option").remove();
    const sortedStats = [...statsConfig[currentCategory]].sort((a,b) => a.label.localeCompare(b.label));
    sortedStats.forEach(s => sel.append("option").text(s.label).attr("value", s.key));
    s2dData = await d3.json(`./data/${currentCategory}_s2d.json`);
    dailyData = await d3.json(`./data/${currentCategory}.json`);
    updateVisuals();
}

function updateVisuals() {
    const statKey = d3.select("#stat-selector").property("value");
    const statObj = statsConfig[currentCategory].find(s => s.key === statKey);
    const catDisplay = currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1);
    
    const fS2D = s2dData.filter(d => activeTeams.has(d.teamId.toString())).sort((a,b) => d3.ascending(new Date(a.date), new Date(b.date)));
    const fDaily = dailyData.filter(d => activeTeams.has(d.teamId.toString()));
    const fStand = standingsData.filter(d => activeTeams.has(d.teamId.toString())).sort((a,b) => d3.ascending(new Date(a.date), new Date(b.date)));

    // Correcting Title Logic to prevent overwriting
    d3.select("#standings-title").text(`League Standings: (${currentStandingsStat === 'runDifferential' ? 'Run Diff' : 'Win %'})`);
    d3.select("#trend-title").text(`Season Performance Trends: (${statObj.label} - ${catDisplay})`);
    d3.select("#swarm-title").text(`Variance by Game: (${statObj.label} - ${catDisplay})`);

    renderStandings(fStand, currentStandingsStat); 
    renderTrend(fS2D, statKey, statObj.dir); 
    renderSwarm(fDaily, statKey, statObj.dir);
}

function renderStandings(data, stat) {
    if (currentView === 'line') { yStand.domain(d3.extent(data, d => +d[stat])).nice(); } 
    else { yStand.domain([new Set(data.map(d => d.teamId)).size, 1]); }

    const line = d3.line().curve(d3.curveMonotoneX).x(d => xStand(new Date(d.date))).y(d => {
        if (currentView === 'line') return yStand(+d[stat]);
        const daySet = data.filter(v => v.date === d.date).sort((a,b) => d3.descending(+a[stat], +b[stat]));
        return yStand(daySet.findIndex(v => v.teamId === d.teamId) + 1);
    });

    const groups = d3.groups(data, d => d.teamId);
    const lines = standingsSvg.selectAll(".stand-line").data(groups, d => d[0]);
    lines.exit().remove();
    lines.enter().append("path").attr("class", "stand-line line").attr("stroke", d => teamColors[d[0]]?.primary || "#ccc").merge(lines)
        .on("mousemove", function(ev, d) {
            d3.selectAll(".line").style("opacity", 0.05);
            d3.select(this).classed("hovered", true).raise();
            const mouseX = d3.pointer(ev)[0];
            const date = xStand.invert(mouseX);
            const idx = bisectDate(d[1], date);
            const currentPoint = d[1][idx] || d[1][d[1].length-1];
            const latest = d[1][d[1].length-1];
            showDualTooltip(ev, currentPoint, latest, stat);
        })
        .on("mouseleave", function() { d3.selectAll(".line").style("opacity", 0.3).classed("hovered", false); d3.select("#tooltip").style("display", "none"); })
        .transition().duration(800).attr("d", d => line(d[1]));

    standingsSvg.select(".x-axis-stand").call(d3.axisBottom(xStand));
    standingsSvg.select(".y-axis-stand").transition().duration(800).call(d3.axisLeft(yStand));
    
    standingsSvg.selectAll(".stand-label").remove();
    if (currentView === 'race') {
        const last = d3.max(data, d => d.date);
        const ranks = data.filter(d => d.date === last).sort((a,b) => d3.descending(+a[stat], +b[stat]));
        standingsSvg.selectAll(".stand-label").data(ranks, d => d.teamId).enter().append("text")
            .attr("class", "stand-label team-label").attr("x", width + 10).attr("y", (d,i) => yStand(i+1) + 4)
            .text((d,i) => `${i+1}. ${teamColors[d.teamId]?.name}`);
    }
}

function renderTrend(data, stat, dir) {
    xTrend.domain(d3.extent(data, d => new Date(d.date)));
    if (currentView === 'line') yTrend.domain(d3.extent(data, d => +d[stat])).nice();
    else yTrend.domain([new Set(data.map(d => d.teamId)).size, 1]);

    const line = d3.line().curve(d3.curveMonotoneX).x(d => xTrend(new Date(d.date))).y(d => {
        if (currentView === 'line') return yTrend(+d[stat]);
        const daySet = data.filter(v => v.date === d.date).sort((a,b) => dir === 'desc' ? d3.descending(+a[stat], +b[stat]) : d3.ascending(+a[stat], +b[stat]));
        return yTrend(daySet.findIndex(v => v.teamId === d.teamId) + 1);
    });

    const groups = d3.groups(data, d => d.teamId);
    const lines = trendSvg.selectAll(".trend-line").data(groups, d => d[0]);
    lines.exit().remove();
    lines.enter().append("path").attr("class", "trend-line line").attr("stroke", d => teamColors[d[0]]?.primary || "#ccc").merge(lines)
        .on("mousemove", function(ev, d) {
            d3.selectAll(".line").style("opacity", 0.05);
            d3.select(this).classed("hovered", true).raise();
            const mouseX = d3.pointer(ev)[0];
            const date = xTrend.invert(mouseX);
            const idx = bisectDate(d[1], date);
            const currentPoint = d[1][idx] || d[1][d[1].length-1];
            const latest = d[1][d[1].length-1];
            showDualTooltip(ev, currentPoint, latest, stat);
        })
        .on("mouseleave", function() { d3.selectAll(".line").style("opacity", 0.3).classed("hovered", false); d3.select("#tooltip").style("display", "none"); })
        .transition().duration(800).attr("d", d => line(d[1]));

    trendSvg.select(".x-axis").call(d3.axisBottom(xTrend));
    trendSvg.select(".y-axis").transition().duration(800).call(d3.axisLeft(yTrend));
    
    trendSvg.selectAll(".trend-label").remove();
    if (currentView === 'race') {
        const last = d3.max(data, d => d.date);
        const ranks = data.filter(d => d.date === last).sort((a,b) => dir === 'desc' ? d3.descending(+a[stat], +b[stat]) : d3.ascending(+a[stat], +b[stat]));
        trendSvg.selectAll(".trend-label").data(ranks, d => d.teamId).enter().append("text")
            .attr("class", "trend-label team-label").attr("x", width + 10).attr("y", (d,i) => yTrend(i+1) + 4)
            .text((d,i) => `${i+1}. ${teamColors[d.teamId]?.name}`);
    }
}

function renderSwarm(data, stat, dir) {
    const teamGroups = d3.groups(data, d => d.teamId);
    if (currentSort === 'mean') {
        const m = d3.rollup(data, v => d3.median(v, d => +d[stat]), d => d.teamId);
        teamGroups.sort((a,b) => dir === 'desc' ? d3.descending(m.get(a[0]), m.get(b[0])) : d3.ascending(m.get(a[0]), m.get(b[0])));
    } else teamGroups.sort((a,b) => d3.ascending(teamColors[a[0]]?.name, teamColors[b[0]]?.name));
    const sHeight = Math.max(teamGroups.length * 60 + 100, 400);
    d3.select("#swarm-chart svg").attr("height", sHeight);
    xSwarm.domain(d3.extent(data, d => +d[stat])).nice();
    ySwarm.domain(teamGroups.map(d => d[0])).range([0, sHeight - 100]);
    const rows = swarmSvg.selectAll(".swarm-row").data(teamGroups, d => d[0]);
    rows.exit().remove();
    const rowsEnter = rows.enter().append("g").attr("class", "swarm-row");
    rowsEnter.append("text").attr("class", "row-label").attr("x", -15).attr("y", 5).attr("text-anchor", "end").style("font-size", "12px").style("font-weight", "600");
    rowsEnter.append("line").attr("class", "median-marker").attr("y1", -22).attr("y2", 22);
    const mergedRows = rowsEnter.merge(rows);
    mergedRows.transition().duration(800).attr("transform", d => `translate(0,${ySwarm(d[0])})`);
    mergedRows.select(".row-label").text(d => teamColors[d[0]]?.name);
    mergedRows.each(function(d) {
        const rowG = d3.select(this), teamValues = d[1].map(v => +v[stat]), med = d3.median(teamValues);
        const teamData = d[1].map(v => ({...v, x: xSwarm(+v[stat]), y: 0}));
        const sim = d3.forceSimulation(teamData).force("x", d3.forceX(d => d.x).strength(1)).force("y", d3.forceY(0)).force("collide", d3.forceCollide(4.5)).stop();
        for (let i = 0; i < 120; ++i) sim.tick();
        const dots = rowG.selectAll(".swarm-dot").data(teamData, v => v.date);
        dots.exit().remove();
        dots.enter().append("circle").attr("class", "swarm-dot").attr("r", 4).attr("fill", teamColors[d[0]]?.primary || "#ccc").merge(dots)
            .on("mousemove", (ev, v) => showTooltipSwarm(ev, { team: teamColors[v.teamId].name, date: v.date, val: (+v[stat]).toFixed(3), mean: d3.mean(teamValues).toFixed(3), median: med.toFixed(3), min: d3.min(teamValues).toFixed(3), max: d3.max(teamValues).toFixed(3) }, stat, "game"))
            .on("mouseleave", () => d3.select("#tooltip").style("display", "none"))
            .transition().duration(800).attr("cx", v => v.x).attr("cy", v => v.y);
        rowG.select(".median-marker").on("mousemove", (ev) => showTooltipSwarm(ev, { team: teamColors[d[0]].name, mean: d3.mean(teamValues).toFixed(3), median: med.toFixed(3), min: d3.min(teamValues).toFixed(3), max: d3.max(teamValues).toFixed(3) }, stat, "median"))
            .transition().duration(800).attr("x1", xSwarm(med)).attr("x2", xSwarm(med)).attr("stroke", teamColors[d[0]]?.primary || "#333");
    });
    swarmSvg.select(".x-axis-swarm").attr("transform", `translate(0,${sHeight - 90})`).call(d3.axisBottom(xSwarm));
}

function setSort(m) { currentSort = m; d3.selectAll("#sort-name-btn, #sort-mean-btn").classed("active", false); d3.select(m==='name'?'#sort-name-btn':'#sort-mean-btn').classed("active", true); updateVisuals(); }
function setViewMode(v) { currentView = v; d3.selectAll("#btn-line, #btn-race").classed("active", false); d3.select(v==='line'?'#btn-line':'#btn-race').classed("active", true); updateVisuals(); }
function setStandingsStat(s) { currentStandingsStat = s; d3.selectAll("#btn-rundiff, #btn-winpct").classed("active", false); d3.select(s==='runDifferential'?'#btn-rundiff':'#btn-winpct').classed("active", true); updateVisuals(); }

function applyGeo(geo, btn) {
    activeTeams.clear();
    d3.selectAll("#geo-filters .filter-btn").classed("active", false);
    d3.select(btn).classed("active", true);
    Object.entries(teamColors).forEach(([id, info]) => {
        const fullDiv = `${info.league}-${info.division}`;
        if (geo === 'ALL' || info.league === geo || fullDiv === geo) activeTeams.add(id);
    });
    d3.selectAll(".team-pill").each(function() {
        const id = this.id.split('-')[1];
        d3.select(this).classed("active", activeTeams.has(id));
    });
    updateVisuals();
}

function showDualTooltip(ev, current, latest, s) {
    const tt = d3.select("#tooltip");
    tt.style("display", "block").style("left", (ev.pageX + 20) + "px").style("top", (ev.pageY - 20) + "px")
      .html(`<b>${teamColors[current.teamId]?.name}</b><hr>
             Point Date: ${current.date}<br>
             Point Value: <b>${current[s]}</b><br><br>
             Season Latest: <b>${latest[s]}</b>`);
}

function showTooltipSwarm(ev, st, s, type) { 
    const tt = d3.select("#tooltip");
    let content = `<b>${st.team}</b><hr>`;
    if (type === "game") content += `Date: ${st.date}<br>Val: <b>${st.val}</b><br><br>`;
    else content += `<b>Season Aggregates</b><br>`;
    content += `Median: <b>${st.median}</b><br>Mean: ${st.mean}<br>Range: ${st.min} - ${st.max}`;
    tt.style("display", "block").style("left", (ev.pageX + 20) + "px").style("top", (ev.pageY - 20) + "px").html(content); 
}

initApp();
</script>
</body>
</html>
